apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: dev
spec:
  selector:
    app: kafka-service
  ports:
    - name: kafka
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
  type: {{ .Values.service.type }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui-service
  namespace: dev
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: kafka-service
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kafka-ui-ingress
  namespace: dev
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /kafka-ui
        pathType: Prefix
        backend:
          service:
            name: kafka-ui-service
            port:
              number: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kafka-service
spec:
  revisionHistoryLimit: 3
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kafka-service
  template:
    metadata:
      labels:
        app: kafka-service
    spec:
      containers:
        - name: kafka-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
            - containerPort: 9093
          env:
            # 1. Identity
            - name: KAFKA_CFG_NODE_ID
              value: "1"
            - name: KAFKA_KRAFT_CLUSTER_ID
              value: "MDEyMzQ1Njc4OTAxMjM0NQ"
            - name: KAFKA_CFG_PROCESS_ROLES
              value: "broker,controller"
              
            # 2. The "Dual-Mode" Fix (Satisfies both the script and the Java parser)
            
            # This is the "Magic String" for Kafka 3.7+ 
            # Format: ID @ HOST : PORT : DIRECTORY_ID
            - name: KAFKA_INITIAL_CONTROLLERS
              value: "1@127.0.0.1:9093:MDEyMzQ1Njc4OTAxMjM0NQ"
            
            - name: KAFKA_CFG_CONTROLLER_QUORUM_BOOTSTRAP_SERVERS
              value: "127.0.0.1:9093"

            # 3. Networking
            - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_CFG_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka-service.dev.svc.cluster.local:9092"
            - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

            # 4. Storage & Stability
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx256M -Xms256M"
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"

            # 5. Debug
            - name: BITNAMI_DEBUG
              value: "true"
            - name: KAFKA_SKIP_KRAFT_STORAGE_CHECK
              value: "no"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: kafka-data
              mountPath: /bitnami/kafka
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local-dev"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ .Values.kafka.bootstrapServers }}
            - name: KAFKA_CLUSTERS_0_METRICS_PORT
              value: "9997"
      volumes:
        - name: kafka-data
          emptyDir: {}
