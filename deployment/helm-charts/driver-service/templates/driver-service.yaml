apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: driver-ingress
  annotations:
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/driver
        pathType: Prefix
        backend:
          service:
            name: driver-service
            port:
              number: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: driver-service
  namespace: dev
spec:
  selector:
    app: driver-service
  ports:
    - protocol: TCP
      port: 8083
      targetPort: 8083
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-driver-service
spec:
  revisionHistoryLimit: 3
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: driver-service
  template:
    metadata:
      labels:
        app: driver-service
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: driver-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8083
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-pass-secret
                  key: password
            - name: MYSQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-user-name
                  key: username
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: JAVA_OPTS
              value: "-Xms128m -Xmx256m -XX:MaxMetaspaceSize=128m" # optimzing memory usage
            - name: MYSQL_HOST
              value: "{{ .Values.env.MYSQL_HOST }}"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers }} # TODO: make this dynamic
