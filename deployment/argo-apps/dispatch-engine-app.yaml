apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dispatch-engine
  namespace: argocd
spec:
  project: mini-ride-share-platform
  source:
    repoURL: https://github.com/hari7190/mini-ride-share-prototype.git
    targetRevision: HEAD
    path: deployment/helm-charts/dispatch-engine
    helm:
      parameters:
        - name: replicaCount
          value: "1"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
