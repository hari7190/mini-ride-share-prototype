apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1: The external, pinned Helm chart code (upstream)
    - repoURL: oci://ghcr.io/fluent/helm-charts/fluent-bit
      chart: fluent-bit
      targetRevision: 0.57.6
      helm:
        valueFiles:
          - $fluent-bit-values/deployment/helm-charts/fluent-bit/values.yaml
    - repoURL: https://github.com/hari7190/mini-ride-share-prototype.git
      targetRevision: main  # Or a specific git SHA/branch
      ref: fluent-bit-values
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
