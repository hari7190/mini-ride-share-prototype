name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/auth-service/**' # Only run if code in auth-service changes

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Auth Service
      uses: docker/build-push-action@v5
      with:
        context: ./services/auth-service # Tell Docker where the code is
        file: ./services/auth-service/Dockerfile
        push: true
        # This creates two tags: 'auth-service-latest' and one with the Git commit hash
        tags: |
          dockerprogram/mini-ride-share-platform:auth-service-latest
          dockerprogram/mini-ride-share-platform:auth-service-${{ github.sha }}
