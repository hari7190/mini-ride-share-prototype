name: Build Microservices

# GITHUB_TOKEN needs actions:write so BuildKit can read/write the GHA cache backend (type=gha).
permissions:
  contents: read
  actions: write

on:
  push:
    branches: [ "main" ]
    paths:
      - 'services/auth-service/**'
      - 'services/rider-service/**'
      - 'services/dispatch-engine/**'
      - 'services/driver-service/**'
      - 'services/location-tracker/**'
  workflow_dispatch:
    inputs:
      auth:
        description: "Build and push auth service"
        type: boolean
        required: false
        default: false
      rider:
        description: "Build and push rider service"
        type: boolean
        required: false
        default: false
      dispatch:
        description: "Build and push dispatch engine"
        type: boolean
        required: false
        default: false
      driver:
        description: "Build and push driver service"
        type: boolean
        required: false
        default: false
      location_tracker:
        description: "Build and push location tracker"
        type: boolean
        required: false
        default: false

jobs:
  # Push: path filter only. workflow_dispatch: manual inputs only (paths ignored).
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.select.outputs.auth }}
      rider: ${{ steps.select.outputs.rider }}
      dispatch: ${{ steps.select.outputs.dispatch }}
      driver: ${{ steps.select.outputs.driver }}
      location_tracker: ${{ steps.select.outputs.location_tracker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'push'
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth-service/**'
            rider:
              - 'services/rider-service/**'
            dispatch:
              - 'services/dispatch-engine/**'
            driver:
              - 'services/driver-service/**'
            location_tracker:
              - 'services/location-tracker/**'
      - name: Select services to build
        id: select
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "auth=${{ inputs.auth }}" >> "$GITHUB_OUTPUT"
            echo "rider=${{ inputs.rider }}" >> "$GITHUB_OUTPUT"
            echo "dispatch=${{ inputs.dispatch }}" >> "$GITHUB_OUTPUT"
            echo "driver=${{ inputs.driver }}" >> "$GITHUB_OUTPUT"
            echo "location_tracker=${{ inputs.location_tracker }}" >> "$GITHUB_OUTPUT"
          else
            echo "auth=${{ steps.filter.outputs.auth }}" >> "$GITHUB_OUTPUT"
            echo "rider=${{ steps.filter.outputs.rider }}" >> "$GITHUB_OUTPUT"
            echo "dispatch=${{ steps.filter.outputs.dispatch }}" >> "$GITHUB_OUTPUT"
            echo "driver=${{ steps.filter.outputs.driver }}" >> "$GITHUB_OUTPUT"
            echo "location_tracker=${{ steps.filter.outputs.location_tracker }}" >> "$GITHUB_OUTPUT"
          fi

  build-auth:
    needs: changes
    if: ${{ needs.changes.outputs.auth == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: true
          cache-from: type=gha,scope=auth-service
          cache-to: type=gha,mode=max,scope=auth-service
          tags: |
            ${{ secrets.DOCKER_IMAGE_REPO }}:auth-service-latest
            ${{ secrets.DOCKER_IMAGE_REPO }}:auth-service-${{ github.sha }}

  build-rider:
    needs: changes
    if: ${{ needs.changes.outputs.rider == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Rider Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/rider-service
          push: true
          cache-from: type=gha,scope=rider-service
          cache-to: type=gha,mode=max,scope=rider-service
          tags: |
            ${{ secrets.DOCKER_IMAGE_REPO }}:rider-service-latest
            ${{ secrets.DOCKER_IMAGE_REPO }}:rider-service-${{ github.sha }}

  build-dispatch:
    needs: changes
    if: ${{ needs.changes.outputs.dispatch == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Dispatch Engine
        uses: docker/build-push-action@v5
        with:
          context: ./services/dispatch-engine
          push: true
          cache-from: type=gha,scope=dispatch-engine
          cache-to: type=gha,mode=max,scope=dispatch-engine
          tags: |
            ${{ secrets.DOCKER_IMAGE_REPO }}:dispatch-engine-latest
            ${{ secrets.DOCKER_IMAGE_REPO }}:dispatch-engine-${{ github.sha }}

  build-driver:
    needs: changes
    if: ${{ needs.changes.outputs.driver == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Driver Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/driver-service
          push: true
          cache-from: type=gha,scope=driver-service
          cache-to: type=gha,mode=max,scope=driver-service
          tags: |
            ${{ secrets.DOCKER_IMAGE_REPO }}:driver-service-latest
            ${{ secrets.DOCKER_IMAGE_REPO }}:driver-service-${{ github.sha }}

  build-location-tracker:
    needs: changes
    if: ${{ needs.changes.outputs.location_tracker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Location Tracker
        uses: docker/build-push-action@v5
        with:
          context: ./services/location-tracker
          push: true
          cache-from: type=gha,scope=location-tracker
          cache-to: type=gha,mode=max,scope=location-tracker
          tags: |
            ${{ secrets.DOCKER_IMAGE_REPO }}:location-tracker-latest
            ${{ secrets.DOCKER_IMAGE_REPO }}:location-tracker-${{ github.sha }}
