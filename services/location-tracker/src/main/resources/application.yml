server:
  port: 8084

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.mysql.MySQL56SpatialDialect

  kafka:
    consumer:
      group-id: location-tracker
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

app:
  kafka:
    topics:
      driver-assigned: driver-assigned.v1
      user-created: user-created.v1
    events:
      driver-assigned:
        type: com.zamorincorp.rideshare.locationtracker.dto.RideDispatchEvent
        version: 1.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

info:
  app:
    name: location-tracker
    description: Location Tracker Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      access: read_only
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
