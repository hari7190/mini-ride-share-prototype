server:
  port: 8082

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: dispatch-engine
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  kafka:
    topics:
      ride-requests: ride-requests.v1
      ride-dispatch: ride-dispatch.v1
    events:
      ride-requested:
        type: com.zamorincorp.rideshare.dispatch.dto.RideRequestedEvent
        version: 1.0.0
      ride-dispatch:
        type: com.zamorincorp.rideshare.dispatch.dto.RideDispatchEvent
        version: 1.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

