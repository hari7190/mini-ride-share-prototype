server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

app:
  kafka:
    topics:
      ride-requests: ride-requests.v1
    events:
      ride-requested:
        type: RIDE_REQUESTED
        version: "1"

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours in milliseconds
