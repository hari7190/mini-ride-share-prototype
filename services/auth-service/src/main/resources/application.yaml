server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: auth-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    

  jpa:
    hibernate:
      ddl-auto: update # Automatically creates the 'users' table based on your Entity
    show-sql: true     # Good for debugging; shows the SQL queries in your console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000 # 24 hours in milliseconds

info:
  app:
    name: auth-service
    description: Identity and Access Management Service

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    metrics:
      access: read_only
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true

app:
  kafka:
    topics:
      user-created: user-created.v1
    events:
      user-created:
        type: com.zamorincorp.rideshare.auth.dto.UserCreatedEvent
        version: 1.0.0
