server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates the 'users' table based on your Entity
    show-sql: true     # Good for debugging; shows the SQL queries in your console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Custom JWT settings we'll use later
jwt:
  secret: ${JWT_SECRET:a_very_long_random_string_for_local_dev_at_least_32_chars}
  expiration: 86400000 # 24 hours in milliseconds
