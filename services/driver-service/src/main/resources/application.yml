server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/ride_share_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  kafka:
    consumer:
      group-id: driver-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

app:
  kafka:
    topics:
      driver-assigned: driver-assigned.v1
      ride-accepted: ride-accepted.v1
      user-created: user-created.v1
    events:
      driver-assigned:
        type: com.zamorincorp.rideshare.driver.dto.DriverAssignedEvent
        version: 1.0.0
      ride-accepted:
        type: com.zamorincorp.rideshare.driver.dto.RideAcceptedEvent
        version: 1.0.0

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
